<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Retro Dodge Racer</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #111;
    overflow: hidden;
    touch-action: none;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  canvas {
    display: block;
    background: #111;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border-radius: 12px;
    box-shadow: 0 0 30px rgba(0,0,0,0.85);
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
(() => {
  "use strict";

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  const W = 480;
  const H = 800;

  const ASSET_PATHS = {
    player: "assets/player_car.png",
    car: [
      "assets/enemy_car00.png",
      "assets/enemy_car01.png",
      "assets/enemy_car02.png",
      "assets/enemy_car.png"
    ],
    cone: "assets/cone.png",
    oil: "assets/oil.png",
    barrier: "assets/barrier.png",
    coin: "assets/coin.png",
    invincible: "assets/invincible.png"
  };

  const ASSET_CROPS = {
    "assets/player_car.png": { x: 73, y: 21, w: 110, h: 215 },
    "assets/enemy_car00.png": { x: 72, y: 19, w: 112, h: 219 },
    "assets/enemy_car01.png": { x: 74, y: 29, w: 109, h: 201 },
    "assets/enemy_car02.png": { x: 77, y: 18, w: 102, h: 224 },
    "assets/cone.png": { x: 50, y: 24, w: 156, h: 194 },
    "assets/oil.png": { x: 15, y: 38, w: 226, h: 184 },
    "assets/barrier.png": { x: 27, y: 67, w: 202, h: 117 }
  };

  const assets = {};

  for (const key in ASSET_PATHS) {
    const paths = Array.isArray(ASSET_PATHS[key]) ? ASSET_PATHS[key] : [ASSET_PATHS[key]];
    assets[key] = paths.map(path => {
      const img = new Image();
      const asset = { img, path, loaded: false, crop: ASSET_CROPS[path] || null };

      img.onload = () => {
        asset.loaded = true;
      };

      img.onerror = () => {
        asset.loaded = false;
      };

      img.src = path;
      return asset;
    });
  }

  const STATES = {
    MENU: "menu",
    RANKING: "ranking",
    PLAYING: "playing",
    RESULT: "result"
  };

  const STAGES = [
    {
      name: "初級",
      key: "easy",
      speed: 280,
      maxSpeed: 540,
      accel: 10,
      spawn: 0.88,
      minSpawn: 0.48,
      clearTime: 45,
      doubleSpawnChance: 0.12,
      coinSpawn: 0.88,
      curveStrength: 58
    },
    {
      name: "中級",
      key: "normal",
      speed: 340,
      maxSpeed: 650,
      accel: 13,
      spawn: 0.76,
      minSpawn: 0.38,
      clearTime: 55,
      doubleSpawnChance: 0.22,
      coinSpawn: 0.76,
      curveStrength: 76
    },
    {
      name: "上級",
      key: "hard",
      speed: 400,
      maxSpeed: 760,
      accel: 17,
      spawn: 0.64,
      minSpawn: 0.30,
      clearTime: 65,
      doubleSpawnChance: 0.34,
      coinSpawn: 0.68,
      curveStrength: 92
    }
  ];

  let dpr = 1;
  let state = STATES.MENU;
  let stageIndex = 0;
  let currentStage = STAGES[0];

  let lastTime = 0;
  let gameTime = 0;
  let score = 0;
  let speed = 300;
  let spawnTimer = 0;
  let coinTimer = 0;
  let spawnInterval = 0.8;
  let coinInterval = 0.8;
  let inputCooldown = 0;
  let gamepadCooldown = 0;
  let coinCount = 0;
  let invincibleTimer = 0;

  let resultData = null;

  const road = {
    baseLeft: 70,
    baseRight: 410,
    lanes: 5,
    scroll: 0,
    segments: [],
    nextSegmentStart: 0,
    nextOffset: 0,
    curveDir: 1
  };

  const player = {
    lane: 2,
    x: 0,
    y: 650,
    w: 52,
    h: 102,
    targetX: 0,
    stunTimer: 0,
    oilTimer: 0
  };

  let obstacles = [];
  let pickups = [];
  let particles = [];
  let roadLines = [];

  for (let i = 0; i < 14; i++) {
    roadLines.push({ y: i * 66, h: 32 });
  }

  const pointer = {
    active: false,
    startX: 0,
    startY: 0,
    gameX: 0,
    gameY: 0,
    swiped: false
  };

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);

    const ratio = W / H;
    let viewW = window.innerWidth;
    let viewH = window.innerHeight;

    if (viewW / viewH > ratio) {
      viewW = viewH * ratio;
    } else {
      viewH = viewW / ratio;
    }

    canvas.style.width = `${viewW}px`;
    canvas.style.height = `${viewH}px`;
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.imageSmoothingEnabled = false;
  }

  window.addEventListener("resize", resize);
  resize();

  function roadWidth() {
    return road.baseRight - road.baseLeft;
  }

  function laneWidth() {
    return roadWidth() / road.lanes;
  }

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function smoothStep(t) {
    return t * t * (3 - 2 * t);
  }

  function resetRoadRoute() {
    road.scroll = 0;
    road.segments = [];
    road.nextSegmentStart = -700;
    road.nextOffset = 0;
    road.curveDir = Math.random() < 0.5 ? -1 : 1;

    pushRoadSegment(160, 0);
    pushRoadSegment(360, road.curveDir * currentStage.curveStrength * 0.78);
    ensureRoadRoute(H + 1800);
  }

  function pushRoadSegment(length, targetOffset) {
    const start = road.nextSegmentStart;
    const end = start + length;

    road.segments.push({
      start,
      end,
      from: road.nextOffset,
      to: targetOffset
    });

    road.nextSegmentStart = end;
    road.nextOffset = targetOffset;
  }

  function addRoadRoutePart() {
    const maxOffset = currentStage.curveStrength;
    const keepStraight = Math.random() < 0.34;

    if (keepStraight) {
      const target = Math.random() < 0.5 ? road.nextOffset : road.nextOffset * 0.45;
      pushRoadSegment(220 + Math.random() * 260, target);
      return;
    }

    if (Math.random() < 0.55 || Math.abs(road.nextOffset) > maxOffset * 0.72) road.curveDir *= -1;

    const curveAmount = maxOffset * (0.55 + Math.random() * 0.42);
    const targetOffset = clamp(road.curveDir * curveAmount, -maxOffset, maxOffset);
    pushRoadSegment(260 + Math.random() * 340, targetOffset);
  }

  function ensureRoadRoute(worldY) {
    while (road.nextSegmentStart < worldY + 1200) {
      addRoadRoutePart();
    }

    road.segments = road.segments.filter(segment => segment.end > road.scroll - 900);
  }

  function roadOffsetAtWorld(worldY) {
    ensureRoadRoute(worldY);

    const segment = road.segments.find(part => worldY >= part.start && worldY <= part.end) || road.segments[0];
    if (!segment) return 0;

    const t = clamp((worldY - segment.start) / (segment.end - segment.start), 0, 1);
    return segment.from + (segment.to - segment.from) * smoothStep(t);
  }

  function curveOffsetAt(y) {
    const worldY = road.scroll + H - y;
    return roadOffsetAtWorld(worldY);
  }

  function roadLeftAt(y) {
    return road.baseLeft + curveOffsetAt(y);
  }

  function roadRightAt(y) {
    return road.baseRight + curveOffsetAt(y);
  }

  function laneCenter(lane, y = player.y) {
    return roadLeftAt(y) + laneWidth() * lane + laneWidth() / 2;
  }

  function resetGame() {
    currentStage = STAGES[stageIndex];

    state = STATES.PLAYING;
    gameTime = 0;
    score = 0;
    speed = currentStage.speed;
    spawnInterval = currentStage.spawn;
    coinInterval = currentStage.coinSpawn;
    spawnTimer = 1.0;
    coinTimer = 0.55;
    coinCount = 0;
    invincibleTimer = 0;
    resetRoadRoute();

    obstacles = [];
    pickups = [];
    particles = [];
    resultData = null;

    player.lane = 2;
    player.x = laneCenter(player.lane);
    player.targetX = player.x;
    player.stunTimer = 0;
    player.oilTimer = 0;
  }

  function movePlayer(dir) {
    if (state !== STATES.PLAYING) return;
    if (inputCooldown > 0) return;
    if (player.stunTimer > 0) return;

    player.lane += dir;
    player.lane = Math.max(0, Math.min(road.lanes - 1, player.lane));
    player.targetX = laneCenter(player.lane);
    inputCooldown = 0.1;
  }

  function triggerOilSlip() {
    player.oilTimer = 1.15;
    player.stunTimer = 0.48;

    let dir = Math.random() < 0.5 ? -1 : 1;
    if (player.lane <= 0) dir = 1;
    if (player.lane >= road.lanes - 1) dir = -1;

    player.lane += dir;
    player.lane = Math.max(0, Math.min(road.lanes - 1, player.lane));
    player.targetX = laneCenter(player.lane);
    addParticles(player.x, player.y + 20, "#111", 20);
  }

  function activateInvincible() {
    invincibleTimer = Math.max(invincibleTimer, 5.0);
    addParticles(player.x, player.y - 20, "#fff36b", 34);
    addParticles(player.x, player.y + 20, "#20b7ff", 18);
  }

  function spawnObstacle() {
    const r = Math.random();
    let type = "car";

    if (r < 0.48) type = "car";
    else if (r < 0.68) type = "cone";
    else if (r < 0.86) type = "oil";
    else type = "barrier";

    let w = 50;
    let h = 98;

    if (type === "cone") {
      w = 42;
      h = 52;
    }

    if (type === "oil") {
      w = 56;
      h = 46;
    }

    if (type === "barrier") {
      w = 74;
      h = 42;
    }

    const lane = chooseObstacleLane(h);
    const spawnY = findObstacleSpawnY(lane, h);

    obstacles.push({
      lane,
      x: laneCenter(lane, spawnY),
      y: spawnY,
      w,
      h,
      type,
      assetVariant: type === "car" ? randomAssetVariant("car") : 0,
      speedRatio: type === "car" ? 0.72 + Math.random() * 0.58 : 1,
      drift: type === "car" ? (Math.random() - 0.5) * 0.08 : 0,
      wheelSpin: Math.random() * Math.PI * 2,
      passed: false,
      remove: false
    });
  }

  function chooseObstacleLane(h) {
    for (let attempt = 0; attempt < 12; attempt++) {
      const lane = Math.floor(Math.random() * road.lanes);
      const blocked = obstacles.some(ob => {
        const closeLane = Math.abs(ob.lane - lane) <= 1;
        return closeLane && Math.abs(ob.y + 90) < h + ob.h + 26;
      });

      if (!blocked) return lane;
    }

    return Math.floor(Math.random() * road.lanes);
  }

  function findObstacleSpawnY(lane, h) {
    const baseY = -90;
    const laneGap = h + 34;
    const anyLaneGap = h + 16;
    let y = baseY;

    for (let attempt = 0; attempt < 8; attempt++) {
      const blocked = obstacles.some(ob => {
        const sameLane = ob.lane === lane;
        const closeLane = Math.abs(ob.lane - lane) <= 1;
        const gap = Math.abs(ob.y - y);
        return (sameLane && gap < laneGap) || (closeLane && gap < anyLaneGap);
      });

      if (!blocked) return y;
      y -= h + 46;
    }

    return y;
  }

  function spawnCoin() {
    const lane = Math.floor(Math.random() * road.lanes);

    pickups.push({
      type: "coin",
      lane,
      x: laneCenter(lane, -60),
      y: -60,
      w: 34,
      h: 34,
      remove: false,
      spin: Math.random() * Math.PI * 2
    });
  }

  function addParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x,
        y,
        vx: (Math.random() - 0.5) * 260,
        vy: (Math.random() - 0.5) * 260,
        life: 0.4 + Math.random() * 0.45,
        size: 3 + Math.random() * 5,
        color
      });
    }
  }

  function rectsHit(a, b) {
    const ax = a.x - a.w / 2;
    const ay = a.y - a.h / 2;
    const bx = b.x - b.w / 2;
    const by = b.y - b.h / 2;

    return (
      ax < bx + b.w &&
      ax + a.w > bx &&
      ay < by + b.h &&
      ay + a.h > by
    );
  }

  function finishGame(clear) {
    const finalScore = Math.floor(score + (clear ? 1000 : 0));

    const entry = {
      id: String(Date.now()) + String(Math.random()),
      score: finalScore,
      clear,
      stage: currentStage.name,
      date: formatDate(new Date())
    };

    const rank = saveRanking(currentStage.key, entry);

    resultData = {
      clear,
      score: finalScore,
      rank
    };

    if (!clear) {
      addParticles(player.x, player.y, "#ffd166", 26);
    } else {
      addParticles(player.x, player.y - 40, "#fff36b", 36);
    }

    state = STATES.RESULT;
  }

  function getRankingKey(stageKey) {
    return `retro_dodge_ranking_${stageKey}`;
  }

  function getRankings(stageKey) {
    try {
      const raw = localStorage.getItem(getRankingKey(stageKey));
      const data = JSON.parse(raw || "[]");
      return Array.isArray(data) ? data : [];
    } catch (e) {
      return [];
    }
  }

  function saveRanking(stageKey, entry) {
    const rankings = getRankings(stageKey);
    rankings.push(entry);
    rankings.sort((a, b) => b.score - a.score);

    const top = rankings.slice(0, 5);
    localStorage.setItem(getRankingKey(stageKey), JSON.stringify(top));

    const index = top.findIndex(r => r.id === entry.id);
    return index >= 0 ? index + 1 : null;
  }

  function formatDate(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const d = String(date.getDate()).padStart(2, "0");
    return `${y}/${m}/${d}`;
  }

  function update(dt) {
    if (inputCooldown > 0) inputCooldown -= dt;
    if (gamepadCooldown > 0) gamepadCooldown -= dt;

    updateGamepad();

    if (state !== STATES.PLAYING) {
      updateParticles(dt);
      return;
    }

    gameTime += dt;

    if (player.stunTimer > 0) player.stunTimer -= dt;
    if (player.oilTimer > 0) player.oilTimer -= dt;
    if (invincibleTimer > 0) invincibleTimer -= dt;

    speed = Math.min(
      currentStage.maxSpeed,
      currentStage.speed + gameTime * currentStage.accel
    );

    spawnInterval = Math.max(
      currentStage.minSpawn,
      currentStage.spawn - gameTime * 0.004
    );

    coinInterval = Math.max(0.42, currentStage.coinSpawn - gameTime * 0.002);
    score += dt * speed * 0.08;
    road.scroll += speed * dt;
    ensureRoadRoute(road.scroll + H + 1800);

    player.targetX = laneCenter(player.lane);
    player.x += (player.targetX - player.x) * Math.min(1, dt * 13);

    for (const line of roadLines) {
      line.y += speed * dt;
      if (line.y > H + 60) {
        line.y = -70;
      }
    }

    spawnTimer -= dt;
    coinTimer -= dt;

    if (spawnTimer <= 0) {
      spawnObstacle();

      if (gameTime > 10 && Math.random() < currentStage.doubleSpawnChance) {
        setTimeout(() => {
          if (state === STATES.PLAYING) spawnObstacle();
        }, 130);
      }

      spawnTimer = spawnInterval;
    }

    if (coinTimer <= 0) {
      spawnCoin();
      coinTimer = coinInterval + Math.random() * 0.35;
    }

    const playerBox = {
      x: player.x,
      y: player.y,
      w: player.w * 0.70,
      h: player.h * 0.72
    };

    for (const coin of pickups) {
      coin.y += speed * dt;
      coin.x = laneCenter(coin.lane, coin.y);
      coin.spin += dt * 12;

      const coinBox = {
        x: coin.x,
        y: coin.y,
        w: coin.w * 0.82,
        h: coin.h * 0.82
      };

      if (rectsHit(playerBox, coinBox)) {
        coin.remove = true;
        coinCount += 1;
        score += 100;
        addParticles(coin.x, coin.y, "#fff36b", 16);

        if (coinCount % 5 === 0) {
          activateInvincible();
        }
      }
    }

    for (const ob of obstacles) {
      const itemSpeed = speed * ob.speedRatio;
      ob.y += itemSpeed * dt;
      ob.x = laneCenter(ob.lane, ob.y) + ob.drift * laneWidth();
      ob.wheelSpin += itemSpeed * dt * 0.035;

      if (!ob.passed && ob.y > player.y) {
        ob.passed = true;
        score += 25;
      }

      const obstacleBox = {
        x: ob.x,
        y: ob.y,
        w: ob.w * 0.75,
        h: ob.h * 0.75
      };

      if (rectsHit(playerBox, obstacleBox)) {
        if (invincibleTimer > 0) {
          ob.remove = true;
          score += 60;
          addParticles(ob.x, ob.y, "#20b7ff", 20);
        } else if (ob.type === "oil") {
          ob.remove = true;
          triggerOilSlip();
          score = Math.max(0, score - 50);
        } else {
          finishGame(false);
          break;
        }
      }
    }

    keepObstacleSpacing();

    pickups = pickups.filter(item => item.y < H + 100 && !item.remove);
    obstacles = obstacles.filter(ob => ob.y < H + 120 && !ob.remove);

    updateParticles(dt);

    if (gameTime >= currentStage.clearTime && state === STATES.PLAYING) {
      finishGame(true);
    }
  }

  function keepObstacleSpacing() {
    const cars = obstacles
      .filter(ob => !ob.remove)
      .sort((a, b) => b.y - a.y);

    for (let i = 0; i < cars.length; i++) {
      const front = cars[i];

      for (let j = i + 1; j < cars.length; j++) {
        const back = cars[j];
        if (front.lane !== back.lane) continue;

        const minGap = (front.h + back.h) / 2 + 28;
        if (front.y - back.y < minGap) {
          back.y = front.y - minGap;
          back.x = laneCenter(back.lane, back.y) + back.drift * laneWidth();
        }
      }
    }
  }

  function updateParticles(dt) {
    for (const p of particles) {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= 0.96;
      p.vy *= 0.96;
      p.life -= dt;
    }

    particles = particles.filter(p => p.life > 0);
  }

  function updateGamepad() {
    const pads = navigator.getGamepads ? navigator.getGamepads() : [];
    const pad = pads[0];
    if (!pad) return;

    const axisX = pad.axes[0] || 0;
    const left = axisX < -0.45 || pad.buttons[14]?.pressed;
    const right = axisX > 0.45 || pad.buttons[15]?.pressed;
    const decide = pad.buttons[0]?.pressed || pad.buttons[9]?.pressed;
    const cancel = pad.buttons[1]?.pressed;

    if (gamepadCooldown > 0) return;

    if (state === STATES.PLAYING) {
      if (left) {
        movePlayer(-1);
        gamepadCooldown = 0.18;
      }

      if (right) {
        movePlayer(1);
        gamepadCooldown = 0.18;
      }

      return;
    }

    if (state === STATES.MENU) {
      if (left) {
        stageIndex = (stageIndex + STAGES.length - 1) % STAGES.length;
        gamepadCooldown = 0.22;
      }

      if (right) {
        stageIndex = (stageIndex + 1) % STAGES.length;
        gamepadCooldown = 0.22;
      }

      if (decide) {
        resetGame();
        gamepadCooldown = 0.22;
      }

      return;
    }

    if (state === STATES.RANKING) {
      if (left) {
        stageIndex = (stageIndex + STAGES.length - 1) % STAGES.length;
        gamepadCooldown = 0.22;
      }

      if (right) {
        stageIndex = (stageIndex + 1) % STAGES.length;
        gamepadCooldown = 0.22;
      }

      if (cancel || decide) {
        state = STATES.MENU;
        gamepadCooldown = 0.22;
      }

      return;
    }

    if (state === STATES.RESULT) {
      if (decide) {
        resetGame();
        gamepadCooldown = 0.22;
      }

      if (cancel) {
        state = STATES.MENU;
        gamepadCooldown = 0.22;
      }
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    drawBackground();
    drawRoad();
    drawPickups();
    drawObstacles();

    if (state === STATES.PLAYING || state === STATES.RESULT) {
      drawPlayer();
    }

    drawParticles();

    if (state === STATES.PLAYING) drawGameUI();
    if (state === STATES.MENU) drawMenu();
    if (state === STATES.RANKING) drawRanking();
    if (state === STATES.RESULT) drawResult();
  }

  function drawBackground() {
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, "#171d35");
    bg.addColorStop(0.5, "#24234b");
    bg.addColorStop(1, "#101018");

    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = "#28202a";

    for (let i = 0; i < 11; i++) {
      const x = (i * 76 + Math.sin(i * 2.1) * 20) % W;
      const h = 80 + (i % 5) * 28;
      ctx.fillRect(x - 18, H - h - 65, 36, h);
    }
  }

  function drawRoad() {
    drawCurvedBand(-36, 36, "#333");
    drawCurvedBand(0, 0, "#252525");

    ctx.strokeStyle = "#f2f2d5";
    ctx.lineWidth = 5;
    drawCurveLine(roadLeftAt, 0, H);
    drawCurveLine(roadRightAt, 0, H);

    ctx.strokeStyle = "rgba(255,255,255,0.36)";
    ctx.lineWidth = 2;

    for (let i = 1; i < road.lanes; i++) {
      for (const line of roadLines) {
        const startY = line.y;
        const endY = line.y + line.h;
        drawCurveLine(y => roadLeftAt(y) + laneWidth() * i, startY, endY);
      }
    }
  }

  function drawCurvedBand(leftPad, rightPad, color) {
    const step = 42;
    ctx.fillStyle = color;
    ctx.beginPath();

    for (let y = 0; y <= H + step; y += step) {
      const yy = Math.min(y, H);
      const x = roadLeftAt(yy) + leftPad;
      if (y === 0) ctx.moveTo(x, yy);
      else ctx.lineTo(x, yy);
    }

    for (let y = H + step; y >= 0; y -= step) {
      const yy = Math.max(0, Math.min(y, H));
      ctx.lineTo(roadRightAt(yy) + rightPad, yy);
    }

    ctx.closePath();
    ctx.fill();
  }

  function drawCurveLine(getX, startY, endY) {
    const step = 16;
    ctx.beginPath();

    for (let y = startY; y <= endY; y += step) {
      const yy = Math.max(0, Math.min(H, y));
      const x = getX(yy);
      if (y === startY) ctx.moveTo(x, yy);
      else ctx.lineTo(x, yy);
    }

    ctx.stroke();
  }

  function drawPlayer() {
    const wobble = player.oilTimer > 0
      ? Math.sin(performance.now() * 0.045) * 7
      : 0;

    const pulse = invincibleTimer > 0
      ? 1 + Math.sin(performance.now() * 0.025) * 0.08
      : 1;

    if (invincibleTimer > 0) {
      ctx.save();
      ctx.globalAlpha = 0.42;
      ctx.strokeStyle = "#fff36b";
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.ellipse(player.x, player.y, 43 * pulse, 59 * pulse, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    drawImageOrFallback(
      "player",
      player.x + wobble,
      player.y,
      player.w,
      player.h,
      () => {
        ctx.save();
        ctx.translate(player.x + wobble, player.y);

        ctx.fillStyle = "#111";
        ctx.fillRect(-player.w / 2 + 4, player.h / 2 - 10, player.w - 8, 12);

        ctx.fillStyle = invincibleTimer > 0 ? "#20d6ff" : "#20b7ff";
        roundRect(-player.w / 2, -player.h / 2, player.w, player.h, 8);
        ctx.fill();

        ctx.fillStyle = "#e6f7ff";
        roundRect(-player.w / 2 + 10, -player.h / 2 + 12, player.w - 20, 22, 4);
        ctx.fill();

        ctx.fillStyle = "#005c93";
        ctx.fillRect(-player.w / 2 + 8, 8, player.w - 16, 22);

        ctx.fillStyle = "#111";
        ctx.fillRect(-player.w / 2 - 5, -player.h / 2 + 10, 8, 18);
        ctx.fillRect(player.w / 2 - 3, -player.h / 2 + 10, 8, 18);
        ctx.fillRect(-player.w / 2 - 5, player.h / 2 - 30, 8, 18);
        ctx.fillRect(player.w / 2 - 3, player.h / 2 - 30, 8, 18);

        ctx.fillStyle = "#fff36b";
        ctx.fillRect(-player.w / 2 + 6, -player.h / 2 + 3, 10, 8);
        ctx.fillRect(player.w / 2 - 16, -player.h / 2 + 3, 10, 8);

        ctx.restore();
      }
    );
  }

  function drawPickups() {
    for (const item of pickups) {
      if (item.type === "coin") {
        drawImageOrFallback("coin", item.x, item.y, item.w, item.h, () => drawCoin(item));
      }
    }
  }

  function drawObstacles() {
    for (const ob of obstacles) {
      if (ob.type === "car") {
        drawImageOrFallback("car", ob.x, ob.y, ob.w, ob.h, () => drawEnemyCar(ob), ob.assetVariant);
      }

      if (ob.type === "cone") {
        drawImageOrFallback("cone", ob.x, ob.y, ob.w, ob.h, () => drawCone(ob));
      }

      if (ob.type === "oil") {
        drawImageOrFallback("oil", ob.x, ob.y, ob.w, ob.h, () => drawOil(ob));
      }

      if (ob.type === "barrier") {
        drawImageOrFallback("barrier", ob.x, ob.y, ob.w, ob.h, () => drawBarrier(ob));
      }
    }
  }

  function randomAssetVariant(key) {
    const list = assets[key] || [];
    const loadedIndexes = list
      .map((asset, index) => asset.loaded ? index : -1)
      .filter(index => index >= 0);

    if (loadedIndexes.length > 0) {
      return loadedIndexes[Math.floor(Math.random() * loadedIndexes.length)];
    }

    return Math.floor(Math.random() * Math.max(1, list.length));
  }

  function getAsset(key, variant = 0) {
    const list = assets[key] || [];
    const selected = list[variant];

    if (selected && selected.loaded) return selected;
    return list.find(asset => asset.loaded) || null;
  }

  function drawImageOrFallback(key, x, y, w, h, fallback, variant = 0) {
    const asset = getAsset(key, variant);

    if (asset) {
      if (asset.crop) {
        ctx.drawImage(
          asset.img,
          asset.crop.x,
          asset.crop.y,
          asset.crop.w,
          asset.crop.h,
          x - w / 2,
          y - h / 2,
          w,
          h
        );
      } else {
        ctx.drawImage(asset.img, x - w / 2, y - h / 2, w, h);
      }
    } else {
      fallback();
    }
  }

  function drawEnemyCar(ob) {
    ctx.save();
    ctx.translate(ob.x, ob.y);

    const speedMark = ob.speedRatio > 1.06 ? "#ffb02e" : "#ff3b4f";
    const streakAlpha = clamp((ob.speedRatio - 0.75) * 0.7, 0.08, 0.38);

    ctx.save();
    ctx.globalAlpha = streakAlpha;
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(-ob.w / 2 + 6, -ob.h / 2 - 18, 4, 16);
    ctx.fillRect(ob.w / 2 - 10, -ob.h / 2 - 24, 4, 22);
    ctx.restore();

    ctx.fillStyle = "#111";
    ctx.fillRect(-ob.w / 2 + 4, ob.h / 2 - 8, ob.w - 8, 10);

    ctx.fillStyle = speedMark;
    roundRect(-ob.w / 2, -ob.h / 2, ob.w, ob.h, 8);
    ctx.fill();

    ctx.fillStyle = "#ffe1e1";
    roundRect(-ob.w / 2 + 8, -ob.h / 2 + 10, ob.w - 16, 20, 4);
    ctx.fill();

    ctx.fillStyle = "#75151d";
    ctx.fillRect(-ob.w / 2 + 7, 10, ob.w - 14, 20);

    ctx.fillStyle = "#111";
    ctx.fillRect(-ob.w / 2 - 5, -ob.h / 2 + 10, 8, 18);
    ctx.fillRect(ob.w / 2 - 3, -ob.h / 2 + 10, 8, 18);
    ctx.fillRect(-ob.w / 2 - 5, ob.h / 2 - 28, 8, 18);
    ctx.fillRect(ob.w / 2 - 3, ob.h / 2 - 28, 8, 18);

    ctx.strokeStyle = "#666";
    ctx.lineWidth = 2;
    for (const wx of [-ob.w / 2 - 1, ob.w / 2 + 1]) {
      for (const wy of [-ob.h / 2 + 19, ob.h / 2 - 19]) {
        ctx.save();
        ctx.translate(wx, wy);
        ctx.rotate(ob.wheelSpin);
        ctx.beginPath();
        ctx.moveTo(-5, 0);
        ctx.lineTo(5, 0);
        ctx.moveTo(0, -5);
        ctx.lineTo(0, 5);
        ctx.stroke();
        ctx.restore();
      }
    }

    ctx.restore();
  }

  function drawCone(ob) {
    ctx.save();
    ctx.translate(ob.x, ob.y);

    ctx.fillStyle = "#ff9f1c";
    ctx.beginPath();
    ctx.moveTo(0, -ob.h / 2);
    ctx.lineTo(ob.w / 2, ob.h / 2);
    ctx.lineTo(-ob.w / 2, ob.h / 2);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#fff";
    ctx.fillRect(-ob.w / 2 + 5, -2, ob.w - 10, 7);

    ctx.fillStyle = "#333";
    ctx.fillRect(-ob.w / 2 - 4, ob.h / 2 - 6, ob.w + 8, 8);

    ctx.restore();
  }

  function drawOil(ob) {
    ctx.save();
    ctx.translate(ob.x, ob.y);

    ctx.fillStyle = "#050505";
    ctx.beginPath();
    ctx.ellipse(0, 0, ob.w / 2, ob.h / 2, 0.2, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "rgba(255,255,255,0.18)";
    ctx.beginPath();
    ctx.ellipse(-8, -5, 11, 5, -0.2, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawBarrier(ob) {
    ctx.save();
    ctx.translate(ob.x, ob.y);

    ctx.fillStyle = "#ececec";
    roundRect(-ob.w / 2, -ob.h / 2, ob.w, ob.h, 4);
    ctx.fill();

    ctx.fillStyle = "#ff4b31";
    for (let i = -2; i <= 2; i++) {
      ctx.save();
      ctx.translate(i * 18, 0);
      ctx.rotate(-0.55);
      ctx.fillRect(-5, -ob.h, 10, ob.h * 2);
      ctx.restore();
    }

    ctx.restore();
  }

  function drawCoin(item) {
    ctx.save();
    ctx.translate(item.x, item.y);
    ctx.scale(Math.max(0.35, Math.abs(Math.cos(item.spin))), 1);

    ctx.fillStyle = "#7a4b00";
    ctx.beginPath();
    ctx.arc(0, 0, item.w / 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#fff36b";
    ctx.beginPath();
    ctx.arc(0, 0, item.w / 2 - 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#d49b00";
    ctx.font = "bold 20px monospace";
    ctx.textAlign = "center";
    ctx.fillText("C", 0, 7);

    ctx.restore();
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
      ctx.globalAlpha = 1;
    }
  }

  function drawGameUI() {
    ctx.fillStyle = "rgba(0,0,0,0.48)";
    roundRect(18, 18, 222, invincibleTimer > 0 ? 136 : 116, 12);
    ctx.fill();

    ctx.fillStyle = "#fff";
    ctx.textAlign = "left";

    ctx.font = "bold 21px monospace";
    ctx.fillText(`SCORE ${Math.floor(score)}`, 32, 48);

    ctx.font = "15px sans-serif";
    ctx.fillText(`STAGE ${currentStage.name}`, 32, 73);

    const remain = Math.max(0, Math.ceil(currentStage.clearTime - gameTime));
    const coinsToInvincible = 5 - (coinCount % 5 || 0);
    ctx.fillText(`CLEARまで ${remain}秒`, 32, 96);
    ctx.fillText(`COIN ${coinCount} / NEXT ${coinsToInvincible}`, 32, 119);

    if (invincibleTimer > 0) {
      ctx.fillStyle = "#fff36b";
      ctx.font = "bold 15px sans-serif";
      ctx.fillText(`無敵 ${Math.ceil(invincibleTimer)}秒`, 32, 142);
    }

    if (player.stunTimer > 0) {
      ctx.textAlign = "center";
      ctx.fillStyle = "#fff36b";
      ctx.font = "bold 34px sans-serif";
      ctx.fillText("SLIP!", W / 2, 190);

      ctx.fillStyle = "#ffffff";
      ctx.font = "16px sans-serif";
      ctx.fillText("オイルで少し操作不能!", W / 2, 220);
    }

    if (invincibleTimer > 0) {
      ctx.textAlign = "center";
      ctx.fillStyle = "#fff36b";
      ctx.font = "bold 30px sans-serif";
      ctx.fillText("INVINCIBLE!", W / 2, 160);
    }

    ctx.fillStyle = "rgba(255,255,255,0.8)";
    ctx.font = "13px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("SWIPE / ← → / A D / GAMEPAD", W / 2, H - 30);
  }

  function drawMenu() {
    ctx.fillStyle = "rgba(0,0,0,0.68)";
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = "center";

    ctx.fillStyle = "#fff36b";
    ctx.font = "bold 42px monospace";
    ctx.fillText("RETRO", W / 2, 115);
    ctx.fillText("DODGE RACER", W / 2, 165);

    ctx.fillStyle = "#fff";
    ctx.font = "16px sans-serif";
    ctx.fillText("カーブするコースで障害物をよけて走り切ろう", W / 2, 215);
    ctx.fillText("コイン5枚ごとに無敵が発動", W / 2, 240);

    ctx.font = "bold 20px sans-serif";
    ctx.fillText("ステージ選択", W / 2, 292);

    for (let i = 0; i < STAGES.length; i++) {
      const y = 320 + i * 66;
      const selected = i === stageIndex;

      ctx.fillStyle = selected ? "#20b7ff" : "rgba(255,255,255,0.18)";
      roundRect(70, y, 340, 50, 12);
      ctx.fill();

      ctx.fillStyle = selected ? "#00151f" : "#ffffff";
      ctx.font = "bold 22px sans-serif";
      ctx.fillText(STAGES[i].name, W / 2, y + 32);
    }

    drawButton(95, 565, 290, 56, "START");
    drawButton(95, 640, 290, 50, "ランキング");

    ctx.fillStyle = "rgba(255,255,255,0.75)";
    ctx.font = "13px sans-serif";
    ctx.fillText("左右キーで選択 / Enterで開始", W / 2, 735);
  }

  function drawRanking() {
    ctx.fillStyle = "rgba(0,0,0,0.74)";
    ctx.fillRect(0, 0, W, H);

    const stage = STAGES[stageIndex];
    const rankings = getRankings(stage.key);

    ctx.textAlign = "center";

    ctx.fillStyle = "#fff36b";
    ctx.font = "bold 34px sans-serif";
    ctx.fillText("RANKING", W / 2, 105);

    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 24px sans-serif";
    ctx.fillText(stage.name, W / 2, 155);

    drawButton(45, 135, 70, 42, "<");
    drawButton(365, 135, 70, 42, ">");

    ctx.font = "18px monospace";
    ctx.textAlign = "left";

    if (rankings.length === 0) {
      ctx.fillStyle = "rgba(255,255,255,0.8)";
      ctx.textAlign = "center";
      ctx.fillText("まだ記録がありません", W / 2, 330);
    } else {
      for (let i = 0; i < rankings.length; i++) {
        const r = rankings[i];
        const y = 240 + i * 62;

        ctx.fillStyle = "rgba(255,255,255,0.12)";
        roundRect(54, y - 30, 372, 48, 10);
        ctx.fill();

        ctx.fillStyle = "#ffffff";
        ctx.textAlign = "left";
        ctx.font = "bold 18px monospace";
        ctx.fillText(`${i + 1}. ${r.score}`, 78, y);

        ctx.font = "14px sans-serif";
        ctx.textAlign = "right";
        ctx.fillText(r.clear ? "CLEAR" : "CRASH", 320, y);
        ctx.fillText(r.date, 405, y);
      }
    }

    drawButton(95, 680, 290, 52, "メニューへ戻る");

    ctx.fillStyle = "rgba(255,255,255,0.72)";
    ctx.font = "13px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("左右キーでステージ切替", W / 2, 760);
  }

  function drawResult() {
    ctx.fillStyle = "rgba(0,0,0,0.75)";
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = "center";

    ctx.fillStyle = resultData.clear ? "#fff36b" : "#ff4b5c";
    ctx.font = "bold 42px monospace";
    ctx.fillText(resultData.clear ? "STAGE CLEAR!" : "CRASH!", W / 2, 195);

    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 26px monospace";
    ctx.fillText(`SCORE ${resultData.score}`, W / 2, 265);

    ctx.font = "18px sans-serif";
    ctx.fillText(`ステージ: ${currentStage.name}`, W / 2, 310);
    ctx.fillText(`COIN: ${coinCount}`, W / 2, 338);

    if (resultData.rank) {
      ctx.fillStyle = "#20b7ff";
      ctx.font = "bold 22px sans-serif";
      ctx.fillText(`ランキング ${resultData.rank}位 入賞!`, W / 2, 385);
    } else {
      ctx.fillStyle = "#ffffff";
      ctx.font = "17px sans-serif";
      ctx.fillText("ランキング圏外", W / 2, 385);
    }

    drawButton(95, 455, 290, 54, "もう一度");
    drawButton(95, 530, 290, 50, "ランキング");
    drawButton(95, 600, 290, 50, "メニューへ");
  }

  function drawButton(x, y, w, h, text) {
    ctx.fillStyle = "#20b7ff";
    roundRect(x, y, w, h, 12);
    ctx.fill();

    ctx.fillStyle = "#00151f";
    ctx.font = "bold 21px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(text, x + w / 2, y + h / 2 + 8);
  }

  function roundRect(x, y, w, h, r) {
    const rr = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.lineTo(x + w - rr, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
    ctx.lineTo(x + w, y + h - rr);
    ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
    ctx.lineTo(x + rr, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
    ctx.lineTo(x, y + rr);
    ctx.quadraticCurveTo(x, y, x + rr, y);
  }

  function loop(time) {
    const dt = Math.min(0.033, (time - lastTime) / 1000 || 0);
    lastTime = time;

    update(dt);
    draw();

    requestAnimationFrame(loop);
  }

  requestAnimationFrame(loop);

  function getCanvasPoint(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (clientX - rect.left) * (W / rect.width),
      y: (clientY - rect.top) * (H / rect.height)
    };
  }

  function isInside(x, y, bx, by, bw, bh) {
    return x >= bx && x <= bx + bw && y >= by && y <= by + bh;
  }

  function handleTap(x, y) {
    if (state === STATES.MENU) {
      for (let i = 0; i < STAGES.length; i++) {
        const by = 320 + i * 66;
        if (isInside(x, y, 70, by, 340, 50)) {
          stageIndex = i;
          return;
        }
      }

      if (isInside(x, y, 95, 565, 290, 56)) {
        resetGame();
        return;
      }

      if (isInside(x, y, 95, 640, 290, 50)) {
        state = STATES.RANKING;
        return;
      }
    }

    if (state === STATES.RANKING) {
      if (isInside(x, y, 45, 135, 70, 42)) {
        stageIndex = (stageIndex + STAGES.length - 1) % STAGES.length;
        return;
      }

      if (isInside(x, y, 365, 135, 70, 42)) {
        stageIndex = (stageIndex + 1) % STAGES.length;
        return;
      }

      if (isInside(x, y, 95, 680, 290, 52)) {
        state = STATES.MENU;
        return;
      }
    }

    if (state === STATES.RESULT) {
      if (isInside(x, y, 95, 455, 290, 54)) {
        resetGame();
        return;
      }

      if (isInside(x, y, 95, 530, 290, 50)) {
        state = STATES.RANKING;
        return;
      }

      if (isInside(x, y, 95, 600, 290, 50)) {
        state = STATES.MENU;
        return;
      }
    }
  }

  canvas.addEventListener("pointerdown", (e) => {
    e.preventDefault();

    const p = getCanvasPoint(e.clientX, e.clientY);

    pointer.active = true;
    pointer.startX = e.clientX;
    pointer.startY = e.clientY;
    pointer.gameX = p.x;
    pointer.gameY = p.y;
    pointer.swiped = false;
  });

  canvas.addEventListener("pointermove", (e) => {
    if (!pointer.active) return;
    if (state !== STATES.PLAYING) return;

    e.preventDefault();

    const dx = e.clientX - pointer.startX;
    const dy = e.clientY - pointer.startY;

    if (!pointer.swiped && Math.abs(dx) > 35 && Math.abs(dx) > Math.abs(dy)) {
      movePlayer(dx > 0 ? 1 : -1);
      pointer.swiped = true;
    }
  });

  canvas.addEventListener("pointerup", (e) => {
    e.preventDefault();

    const p = getCanvasPoint(e.clientX, e.clientY);

    if (state !== STATES.PLAYING) {
      handleTap(p.x, p.y);
    }

    pointer.active = false;
  });

  window.addEventListener("keydown", (e) => {
    const key = e.key.toLowerCase();

    if (state === STATES.PLAYING) {
      if (key === "arrowleft" || key === "a") {
        e.preventDefault();
        movePlayer(-1);
      }

      if (key === "arrowright" || key === "d") {
        e.preventDefault();
        movePlayer(1);
      }

      return;
    }

    if (state === STATES.MENU) {
      if (key === "arrowleft" || key === "a") {
        stageIndex = (stageIndex + STAGES.length - 1) % STAGES.length;
      }

      if (key === "arrowright" || key === "d") {
        stageIndex = (stageIndex + 1) % STAGES.length;
      }

      if (key === "enter" || key === " ") {
        e.preventDefault();
        resetGame();
      }

      if (key === "r") {
        state = STATES.RANKING;
      }

      return;
    }

    if (state === STATES.RANKING) {
      if (key === "arrowleft" || key === "a") {
        stageIndex = (stageIndex + STAGES.length - 1) % STAGES.length;
      }

      if (key === "arrowright" || key === "d") {
        stageIndex = (stageIndex + 1) % STAGES.length;
      }

      if (key === "escape" || key === "backspace" || key === "enter") {
        state = STATES.MENU;
      }

      return;
    }

    if (state === STATES.RESULT) {
      if (key === "enter" || key === " ") {
        e.preventDefault();
        resetGame();
      }

      if (key === "r") {
        state = STATES.RANKING;
      }

      if (key === "m" || key === "escape") {
        state = STATES.MENU;
      }
    }
  });
})();
</script>
</body>
</html>
